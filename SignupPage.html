<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Signup Page</title>
	<link rel="icon" type="image/png" href="logo.png">
</head>
<body>
	<div>
		<form>
			<fieldset>
				<legend align="center"><b>SIGNUP</b></legend>
				<label for="usrn">USERNAME :</label>
				<input type="text" name="unm" required placeholder="Enter new username" pattern="[A-B,a-b,0-9]{6-15}" maxlength="15" id="usrn" autofocus>
				<br><br>
				<label for="pwd">PASSWORD :</label>
				<input type="password" name="pwd" required placeholder="Enter new password" pattern="[A-B,a-b,0-9]{6-15}" maxlength="15" id="pwd">
				<br><br>
				<label id="email">EMAIL :</label>
				<input type="email" name="email" id="email" placeholder="xyz@example.com" required>
				<br><br>
				<label id="phn">Phone Number:</label>
				<input type="text" name="phn" id="phn" required placeholder="Enter phone number" maxlength="10" pattern="[6-9]{1}[0-9]{9}">
				<br><br>
				<label id="dob">DATE OF BIRTH :</label>
				<input type="date" name="dob" id="dob" required >
				<br><br>
				<label>Gender :</label>
				<input type="radio" name="gender">Male
				<input type="radio" name="gender">Female
				<br><br>
				<label>UNIVERSITY :</label>
				<select>
					<option>Select an option</option>
					<option>SPPU</option>
					<option>MSBTE</option>
					<option>other</option>
				</select>
				<br><br>
				<label>ADD ATTACHMENT :</label>
				<input type="file" name="atch">
				<br><br>
				<input type="checkbox" name="agr">I agree the TnC&#169;
				<br><br>
				<input type="submit" name="smb">
				<input type="reset" name="cnl" value="CANCEL">
			</fieldset>
		</form>
	</div>

</body>
</html>
